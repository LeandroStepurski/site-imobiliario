<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com o corretor Leandro Ferreira. Solicite avaliações, tire dúvidas ou agende visitas a imóveis.">
    <title>Entre em contato com o corretor Leandro Ferreira</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Leandro Ferreira Corretor de Imóveis</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre Mim</a></li>
                <li><a href="imoveis.html">Imóveis</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contato">
            <h2>Entre em contato</h2>
            <p>Preencha o formulário abaixo para entrar em contato comigo. Responderei o mais breve possível.</p>
            
            <form id="form-contato" action="#" method="POST">

                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome"> 
                    <span class="erro-mensagem" id="erro-nome"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email">
                    <span class="erro-mensagem" id="erro-email"></span>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone / Whatsapp:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(42) 9 9999-9999"> 
                    <span class="erro-mensagem" id="erro-telefone"></span>
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Qual tipo de imóvel você procura?"></textarea>
                    <span class="erro-mensagem" id="erro-mensagem"></span>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Desenvolvido por: <a href="https://www.linkedin.com/in/leandro-stepurski-ferreira/" target="_blank">Leandro Stepurski</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
